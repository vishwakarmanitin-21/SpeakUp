<svg width="320" height="100" viewBox="0 0 680 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SpeakUp logo</title>
  <desc>Blue rounded-square icon with a white microphone and three text lines, beside the SpeakUp wordmark.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#56c2f0"/>
      <stop offset="1" stop-color="#2f8fd0"/>
    </linearGradient>
  </defs>

  <!-- App icon (mic -> structured text) -->
  <rect x="120" y="45" width="120" height="120" rx="30" fill="url(#tile)"/>
  <rect x="156" y="74" width="19" height="40" rx="9.5" fill="#ffffff"/>
  <path d="M147 104 Q165.5 130 184 104" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="165.5" y1="116" x2="165.5" y2="132" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="154" y1="133" x2="177" y2="133" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <rect x="192" y="92" width="34" height="7" rx="3.5" fill="#ffffff" opacity="0.95"/>
  <rect x="192" y="105" width="26" height="7" rx="3.5" fill="#ffffff" opacity="0.78"/>
  <rect x="192" y="118" width="18" height="7" rx="3.5" fill="#ffffff" opacity="0.6"/>

  <!-- Wordmark (swap text to the chosen name) -->
  <text x="272" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="600">
    <tspan fill="#1f2933">Speak</tspan><tspan fill="#2f8fd0">Up</tspan>
  </text>
  <text x="274" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#6b7785">voice to clean, structured text</text>
</svg>
